<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/contact.css" />
    <link rel="stylesheet" href="css/hero.css" />

  </head>
  <body>
    <header class="site-header">
      <h1><a href="./index.html">TripGo</a></h1>

      <nav class="main-nav">
        <a href="./index.html">Inicio</a>
        <a href="./services.html">Servicios</a>
        <a href="./contact.html" class="active">Contacto</a>
      </nav>
    </header>

    <main class="site-main">
      <section class="card contact-card">
        <h2>Contactanos</h2>

        <form action="#" method="post" class="contact-form">
          <div class="form-group">
            <label for="nombre">Nombre y apellido</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              placeholder="Ingresá tu nombre completo"
              required
            />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="telefono">Teléfono</label>
              <input
                type="tel"
                id="telefono"
                name="telefono"
                placeholder="Ej: +54 9 11 1234-5678"
                required
              />
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Ej: contacto@empresa.com"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="empresa">Empresa</label>
            <input
              type="text"
              id="empresa"
              name="empresa"
              placeholder="Nombre de la empresa"
            />
          </div>

          <div class="form-group">
            <label for="motivo">Motivo de contacto</label>

            <select id="motivo" name="motivo" required>
              <option value="">Seleccioná una opción</option>
              <option value="consulta_general">Consulta general</option>
              <option value="solicitud_informacion">
                Solicitud de información
              </option>
              <option value="reclamo">Reclamo</option>
              <option value="propuesta_comercial">Propuesta comercial</option>
              <option value="otro">Otro</option>
            </select>

            <input
              type="text"
              id="otro-texto"
              name="otro-texto"
              placeholder="Si elegiste 'Otro', especificá acá"
            />
          </div>

          <div class="form-group">
            <label for="mensaje">Mensaje adicional</label>
            <textarea
              id="mensaje"
              name="mensaje"
              rows="5"
              placeholder="Contanos brevemente cómo podemos ayudarte"
            ></textarea>
          </div>

          <div class="form-group">
            <label for="horario"
              >Horario de preferencia para ser contactado</label
            >
            <input
              type="text"
              id="horario"
              name="horario"
              placeholder="Ej: Lunes a viernes de 9 a 18 hs"
            />
          </div>

          <div class="form-group">
            <p class="form-title">Medio de contacto preferido</p>

            <div class="options-row">
              <label
                ><input type="radio" name="medio_contacto" value="WhatsApp" />
                WhatsApp</label
              >
              <label
                ><input type="radio" name="medio_contacto" value="Llamada" />
                Llamada</label
              >
              <label
                ><input type="radio" name="medio_contacto" value="Email" />
                Email</label
              >
            </div>
          </div>

          <button type="submit" class="btn">Enviar consulta</button>
        </form>

        <section class="sub-hero hero-centered">
          <div class="hero-container">
            <h1 class="hero-title">
              Nuestra <strong>oficina</strong>
            </h1>    
          </div>
          <div class="divider">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2420.361955732813!2d-58.38395067108676!3d-34.61747800269413!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95bccad7e05f999b%3A0xec36a432d62a0dfb!2sLima%20757%2C%20C1073%20Cdad.%20Aut%C3%B3noma%20de%20Buenos%20Aires!5e0!3m2!1ses!2sar!4v1777337247565!5m2!1ses!2sar" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>
        </section>

        
      </section>
      
    </main>

    <footer class="site-footer">
      <p>UADE - Diseño y Desarrollo Web</p>
    </footer>
  </body>
</html>
